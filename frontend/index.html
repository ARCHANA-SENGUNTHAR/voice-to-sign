

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice to Sign Translator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 900px;
      width: 100%;
      margin-top: 20px;
    }

    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 1.1em;
    }

    #avatar-container {
      width: 100%;
      height: 400px;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #recordButton {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 18px 50px;
      font-size: 1.3em;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      font-weight: bold;
    }

    #recordButton:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    #recordButton:active {
      transform: translateY(0);
    }

    #recordButton.recording {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4); }
      50% { box-shadow: 0 4px 25px rgba(245, 87, 108, 0.8); }
    }

    .status-box {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      width: 100%;
      min-height: 80px;
      border-left: 4px solid #667eea;
    }

    #status {
      color: #333;
      font-size: 1.1em;
      margin-bottom: 8px;
      font-weight: 500;
    }

    #transcript {
      color: #666;
      font-size: 1em;
      font-style: italic;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      font-size: 1.1em;
      margin-top: 10px;
    }

    .loading.active {
      display: block;
    }

    .loading::after {
      content: '...';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    .error {
      color: #f5576c;
      font-weight: bold;
    }

    .success {
      color: #51cf66;
      font-weight: bold;
    }

    .info-box {
      background: #e7f5ff;
      border-left: 4px solid #339af0;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }

    .info-box h3 {
      color: #1971c2;
      margin-bottom: 10px;
      font-size: 1.1em;
    }

    .info-box ul {
      color: #495057;
      padding-left: 20px;
    }

    .info-box li {
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎤 Voice to Sign Translator</h1>
    <p class="subtitle">Speak and see it in sign language</p>
    
    <div id="avatar-container">
      <div class="sign-label" id="signLabel"></div>
    </div>
    
    <div class="controls">
      <button id="recordButton">🎙️ Start Recording</button>
      
      <div class="status-box">
        <div id="status">Ready to record. Click the button and speak!</div>
        <div id="transcript"></div>
        <div class="loading" id="loading">Processing</div>
      </div>
    </div>

    <div class="info-box">
      <h3>📝 Supported Words:</h3>
      <ul>
        <li>hello, thank you, please</li>
        <li>yes, no</li>
        <li>how are you, I am fine</li>
      </ul>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
